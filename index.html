<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111110">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life OS">
  <title>Life OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #111110;
      --surface: #181816;
      --card: #1F1F1D;
      --card2: #252523;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --sage: #7DA87A;
      --sage-dim: #3D5C3B;
      --sage-pale: rgba(125,168,122,0.10);
      --warm: #C4A882;
      --warm-dim: #6B5438;
      --warm-pale: rgba(196,168,130,0.10);
      --lavender: #9B8EC4;
      --lavender-pale: rgba(155,142,196,0.10);
      --ink: #E8E8E4;
      --ink-mid: #A0A09A;
      --ink-soft: #606060;
    }
    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .app { padding-bottom: 40px; }

    /* HEADER */
    .header {
      padding: 52px 24px 18px;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeUp 0.5s ease forwards 0.05s;
    }
    .greeting-small {
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .greeting-big {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: var(--ink);
      line-height: 1.2;
    }
    .greeting-big em { font-style: italic; color: var(--sage); }
    .date-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 11px;
      color: var(--ink-mid);
      margin-top: 12px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--sage);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

    /* NAV */
    .nav {
      display: flex;
      gap: 6px;
      padding: 0 24px 22px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.15s;
    }
    .nav-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 11px;
      border: 0.5px solid var(--border);
      background: var(--card);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn.active { background: var(--sage-dim); color: var(--sage); border-color: var(--sage-dim); }
    .nav-btn:active { transform: scale(0.97); }

    /* SECTIONS */
    .section { padding: 0 24px; display: none; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; }
    .section.visible { display: block; opacity: 1; transform: translateY(0); }
    .section-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* MOOD */
    .mood-row { display: flex; gap: 6px; margin-bottom: 20px; }
    .mood-chip {
      flex: 1;
      padding: 12px 4px;
      border-radius: 13px;
      border: 0.5px solid var(--border);
      background: var(--card);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mood-chip:active { transform: scale(0.93); }
    .mood-chip.picked { background: var(--sage-pale); border-color: var(--sage-dim); transform: scale(1.07); box-shadow: 0 0 0 3px rgba(125,168,122,0.13); }

    /* STATS */
    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.25s;
    }
    .stat-card {
      flex: 1;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 13px;
      padding: 13px 8px;
      text-align: center;
    }
    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-desc { font-size: 10px; color: var(--ink-soft); }

    /* TODOS */
    .todo-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0;
      transform: translateX(-10px);
    }
    .todo-item.loaded { opacity: 1; transform: translateX(0); transition: opacity 0.3s, transform 0.3s, background 0.2s; }
    .todo-item:active { transform: scale(0.98); }
    .todo-item.done-todo { opacity: 0.35; }
    .todo-item.done-todo .todo-text { text-decoration: line-through; }
    .todo-box {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: transparent;
    }
    .todo-item.done-todo .todo-box { background: var(--warm); border-color: var(--warm); color: #fff; }
    .todo-text { font-size: 13px; color: var(--ink); flex: 1; }
    .todo-tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 500; flex-shrink: 0; }
    .tag-health { background: var(--sage-pale); color: var(--sage); }
    .tag-study { background: var(--warm-pale); color: var(--warm); }
    .tag-life { background: var(--lavender-pale); color: var(--lavender); }

    .add-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .add-input {
      flex: 1;
      padding: 11px 14px;
      border-radius: 12px;
      border: 0.5px solid var(--border);
      background: var(--card);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--sage-dim); }
    .add-input::placeholder { color: var(--ink-soft); }
    .add-btn {
      padding: 11px 16px;
      border-radius: 12px;
      background: var(--sage-dim);
      border: none;
      color: var(--sage);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }
    .add-btn:active { transform: scale(0.93); background: var(--sage); color: #fff; }

    /* HABITS */
    .habit-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .habit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 13px;
      padding: 14px 15px;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0;
      transform: translateX(-8px);
    }
    .habit-item.loaded { opacity: 1; transform: translateX(0); transition: opacity 0.3s, transform 0.3s, background 0.2s; }
    .habit-item:active { transform: scale(0.98); }
    .habit-item.done { background: var(--sage-pale); border-color: var(--sage-dim); }
    .habit-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      transition: all 0.25s;
      flex-shrink: 0;
      color: transparent;
    }
    .habit-item.done .habit-check { background: var(--sage); border-color: var(--sage); color: #fff; }
    .habit-name { font-size: 14px; color: var(--ink); flex: 1; }
    .habit-item.done .habit-name { color: var(--sage); }
    .habit-streak { font-size: 11px; color: var(--warm); font-weight: 500; }

    .progress-wrap { margin-bottom: 20px; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-label { font-size: 13px; color: var(--ink-mid); }
    .progress-pct { font-size: 13px; font-weight: 500; color: var(--sage); }
    .progress-bar { height: 5px; background: var(--card2); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--sage-dim), var(--sage));
      border-radius: 3px;
      width: 0%;
      transition: width 1s cubic-bezier(0.25,1,0.5,1);
    }

    /* NOTES */
    .note-area {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border-radius: 13px;
      border: 0.5px solid var(--border);
      background: var(--card);
      font-size: 14px;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: var(--ink);
      line-height: 1.7;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .note-area:focus { border-color: var(--warm-dim); }
    .note-area::placeholder { color: var(--ink-soft); }
    .note-save {
      padding: 10px 20px;
      border-radius: 12px;
      background: var(--warm-dim);
      border: none;
      color: var(--warm);
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
    }
    .note-save:active { transform: scale(0.96); background: var(--warm); color: #111; }
    .saved-notes { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .note-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-left: 2px solid var(--warm-dim);
      border-radius: 0 12px 12px 0;
      padding: 12px 14px;
      font-size: 13px;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: var(--ink-mid);
      line-height: 1.6;
      animation: fadeUp 0.3s ease forwards;
    }
    .note-meta { font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 10px; color: var(--ink-soft); margin-top: 5px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* install banner */
    .install-banner {
      display: none;
      margin: 0 24px 16px;
      padding: 12px 14px;
      background: var(--card);
      border: 0.5px solid var(--sage-dim);
      border-radius: 13px;
      font-size: 12px;
      color: var(--ink-mid);
      align-items: center;
      gap: 10px;
    }
    .install-banner.show { display: flex; }
    .install-btn {
      margin-left: auto;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--sage-dim);
      border: none;
      color: var(--sage);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <p class="greeting-small">today</p>
    <h1 class="greeting-big">Good morning, <em>Phu</em></h1>
    <div class="date-pill"><span class="dot"></span><span id="dateStr">–</span></div>
  </div>

  <div id="installBanner" class="install-banner">
    <span>📲 Add to Home Screen for app experience</span>
    <button class="install-btn" id="installBtn">Install</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('today')">Today</button>
    <button class="nav-btn" onclick="switchTab('habits')">Habits</button>
    <button class="nav-btn" onclick="switchTab('notes')">Notes</button>
  </div>

  <div class="section visible" id="tab-today">
    <p class="section-label">how are you feeling?</p>
    <div class="mood-row">
      <div class="mood-chip" onclick="pickMood(this)">😴</div>
      <div class="mood-chip" onclick="pickMood(this)">😌</div>
      <div class="mood-chip" onclick="pickMood(this)">🔥</div>
      <div class="mood-chip" onclick="pickMood(this)">😤</div>
      <div class="mood-chip" onclick="pickMood(this)">😊</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="doneCount">0</div><div class="stat-desc">done today</div></div>
      <div class="stat-card"><div class="stat-num" id="streakNum">5</div><div class="stat-desc">day streak</div></div>
      <div class="stat-card"><div class="stat-num" id="focusMin">0</div><div class="stat-desc">min focus</div></div>
    </div>
    <p class="section-label">tasks</p>
    <div class="todo-list" id="todoList"></div>
    <div class="add-row">
      <input class="add-input" id="todoInput" placeholder="add a task...">
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>
  </div>

  <div class="section" id="tab-habits">
    <p class="section-label">daily habits</p>
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Today's progress</span>
        <span class="progress-pct" id="habitPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="habit-list" id="habitList"></div>
  </div>

  <div class="section" id="tab-notes">
    <p class="section-label">journal</p>
    <textarea class="note-area" id="noteInput" placeholder="what's on your mind today..."></textarea>
    <button class="note-save" onclick="saveNote()">✦ save note</button>
    <div class="saved-notes" id="savedNotes"></div>
  </div>
</div>

<script>
  // Load saved data
  function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; } }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  const defaultTodos = [
    { text: 'Morning run 5km', tag: 'health', tagClass: 'tag-health', done: false },
    { text: 'Review Fluid Mechanics notes', tag: 'study', tagClass: 'tag-study', done: false },
    { text: 'Check investment portfolio', tag: 'life', tagClass: 'tag-life', done: false },
    { text: 'Read macro chapter', tag: 'study', tagClass: 'tag-study', done: false },
  ];
  const defaultHabits = [
    { name: 'Wake up before 7am', streak: '12 days', done: false },
    { name: 'Drink 2L water', streak: '5 days', done: false },
    { name: 'Study 2 hours', streak: '8 days', done: false },
    { name: 'No phone before sleep', streak: '3 days', done: false },
    { name: 'Journal', streak: '21 days', done: false },
  ];

  let todos = load('los_todos', defaultTodos);
  let habits = load('los_habits', defaultHabits);
  let notes = load('los_notes', []);

  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    todos.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'todo-item' + (t.done ? ' done-todo' : '');
      el.innerHTML = `<div class="todo-box">${t.done ? '✓' : ''}</div><span class="todo-text">${t.text}</span><span class="todo-tag ${t.tagClass}">${t.tag}</span>`;
      el.onclick = () => { todos[i].done = !todos[i].done; save('los_todos', todos); renderTodos(); };
      list.appendChild(el);
      setTimeout(() => el.classList.add('loaded'), i * 60);
    });
    const done = todos.filter(t => t.done).length;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('focusMin').textContent = done * 25;
  }

  function renderHabits() {
    const list = document.getElementById('habitList');
    list.innerHTML = '';
    habits.forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'habit-item' + (h.done ? ' done' : '');
      el.innerHTML = `<div class="habit-check">${h.done ? '✓' : ''}</div><span class="habit-name">${h.name}</span><span class="habit-streak">${h.streak}</span>`;
      el.onclick = () => { habits[i].done = !habits[i].done; save('los_habits', habits); renderHabits(); };
      list.appendChild(el);
      setTimeout(() => el.classList.add('loaded'), i * 70);
    });
    const pct = Math.round(habits.filter(h => h.done).length / habits.length * 100);
    document.getElementById('habitPct').textContent = pct + '%';
    setTimeout(() => { document.getElementById('progressFill').style.width = pct + '%'; }, 80);
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const val = input.value.trim();
    if (!val) return;
    todos.unshift({ text: val, tag: 'life', tagClass: 'tag-life', done: false });
    save('los_todos', todos);
    renderTodos();
    input.value = '';
  }

  document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  function pickMood(el) {
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('picked'));
    el.classList.add('picked');
  }

  function saveNote() {
    const input = document.getElementById('noteInput');
    const val = input.value.trim();
    if (!val) return;
    const now = new Date();
    notes.unshift({ text: val, time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) });
    save('los_notes', notes);
    input.value = '';
    renderNotes();
  }

  function renderNotes() {
    const c = document.getElementById('savedNotes');
    c.innerHTML = '';
    notes.forEach(n => {
      const el = document.createElement('div');
      el.className = 'note-card';
      el.innerHTML = `"${n.text}"<div class="note-meta">${n.time}</div>`;
      c.appendChild(el);
    });
  }

  function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => { s.classList.remove('visible'); s.style.display = 'none'; });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const tabs = ['today', 'habits', 'notes'];
    document.querySelectorAll('.nav-btn')[tabs.indexOf(tab)].classList.add('active');
    const section = document.getElementById('tab-' + tab);
    section.style.display = 'block';
    setTimeout(() => section.classList.add('visible'), 10);
    if (tab === 'habits') renderHabits();
    if (tab === 'notes') renderNotes();
  }

  const d = new Date();
  document.getElementById('dateStr').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  renderTodos();

  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    }
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
